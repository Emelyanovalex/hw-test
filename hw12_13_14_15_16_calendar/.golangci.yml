run:
  tests: true
  timeout: 5m

linters:
  disable-all: true
  enable:
    - asciicheck
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - copyloopvar
    - funlen
    - gci
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - mnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

issues:
  exclude-dirs:
    - bin
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - dupl
        - funlen
        - gocyclo
        - gosec
        - mnd
        - lll
        - goconst

linters-settings:
  funlen:
    lines: 150
    statements: 80
  gocyclo:
    min-complexity: 20
  lll:
    line-length: 140
  depguard:
    rules:
      main:
        allow:
          - $gostd
          - github.com/Emelyanovalex/hw12_calendar
          - github.com/spf13/viper
          - github.com/stretchr/testify
          - go.uber.org/zap
          - github.com/jmoiron/sqlx
          - github.com/jackc/pgx/v5
          - github.com/google/uuid
